name: Build Debug + Signed Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ==================== 构建 Debug APK ====================
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ==================== 构建 Release APK ====================
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # ==================== 调试：列出所有生成的 APK 文件 ====================
      - name: List all generated APKs (Debug)
        run: |
          echo "=== Debug APK files ==="
          find app/build/outputs/apk -name "*.apk" | head -10 || echo "No debug apk found"

      - name: List all generated APKs (Release)
        run: |
          echo "=== Release APK files ==="
          find app/build/outputs/apk -name "*.apk" | head -10 || echo "No release apk found"

      # ==================== 上传 Debug APK（使用通配符，更可靠） ====================
      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: MIUI-IME-Unlock-Debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      # ==================== 对 Release APK 进行签名 ====================
      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v7
        with:
          name: MIUI-IME-Unlock-Signed-Release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          if-no-files-found: warn

      # ==================== 创建 GitHub Release ====================
      - name: Create Release and Upload Signed APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          tag_name: ${{ github.ref_name }}
          name: MIUI IME Unlock ${{ github.ref_name }}
          body: |
            - **Signed Release APK**（推荐安装）
            - Debug APK 在 Artifacts 中下载
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
