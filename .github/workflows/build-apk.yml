name: Build Debug + Signed Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ==================== 构建 Debug APK ====================
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: MIUI-IME-Unlock-Debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      # ==================== 构建 Release APK (unsigned) ====================
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        
      # ==================== 对齐 + 签名 Release APK ====================   
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/keystore.jks
      
      - name: Align and Sign Release APK
        run: |
          # 对齐 APK
          zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release-aligned.apk

          # 使用 apksigner 进行签名（推荐方式）
          apksigner sign --verbose \
            --ks ${{ github.workspace }}/keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

          # 验证签名
          apksigner verify --verbose app/build/outputs/apk/release/app-release-signed.apk

      # ==================== 上传 Signed Release APK ====================
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v7
        with:
          name: MIUI-IME-Unlock-Signed-Release
          path: app/build/outputs/apk/release/app-release-signed.apk
          if-no-files-found: warn

      # ==================== 创建 GitHub Release 并上传签名 APK ====================
      - name: Create Release and Upload Signed APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-signed.apk
          tag_name: ${{ github.ref_name }}
          name: MIUI IME Unlock ${{ github.ref_name }}
          body: |
            ## 下载
            - **Signed Release APK**（推荐安装使用）
            - Debug APK 请在下方 Artifacts 中下载
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
