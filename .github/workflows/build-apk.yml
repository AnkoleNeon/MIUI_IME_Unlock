name: Build Debug + Signed Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # ==================== 设置 Android SDK 并安装 build-tools ====================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Tools (包含 zipalign & apksigner)
        run: |
          sdkmanager --install "build-tools;34.0.0" --sdk_root=$ANDROID_HOME
          echo "Build tools installed"

      - name: Add Build Tools to PATH
        run: |
          BUILD_TOOLS_PATH="$ANDROID_HOME/build-tools/34.0.0"
          echo "$BUILD_TOOLS_PATH" >> $GITHUB_PATH
          ls -l $BUILD_TOOLS_PATH/zipalign
          ls -l $BUILD_TOOLS_PATH/apksigner

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ==================== 构建 Debug APK ====================
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: MIUI-IME-Unlock-Debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      # ==================== 构建 Release APK ====================
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      # ==================== Decode Keystore ====================
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/keystore.jks

      # ==================== Zipalign + Sign APK ====================
      - name: Align and Sign Release APK
        run: |
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED_APK="app/build/outputs/apk/release/app-release-signed.apk"

          # 对齐
          zipalign -v 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          # 签名
          apksigner sign --verbose \
            --ks keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          # 验证签名
          apksigner verify --verbose "$SIGNED_APK"

          echo "Signed APK created: $SIGNED_APK"

      # ==================== 上传 Signed Release APK ====================
      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v7
        with:
          name: MIUI-IME-Unlock-Signed-Release
          path: app/build/outputs/apk/release/app-release-signed.apk
          if-no-files-found: warn

      # ==================== 创建 GitHub Release ====================
      - name: Create Release and Upload Signed APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-signed.apk
          tag_name: ${{ github.ref_name }}
          name: MIUI IME Unlock ${{ github.ref_name }}
          body: |
            ## 下载
            - **Signed Release APK**（推荐安装）
            - Debug APK 请在 Artifacts 中下载
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
