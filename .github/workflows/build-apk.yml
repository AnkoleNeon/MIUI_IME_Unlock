name: Build Debug + Signed Release APK

on:
  push:
    tags:
      - 'v*'                    
  workflow_dispatch:            

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ==================== 构建 Debug APK ====================
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK (Artifact)
        uses: actions/upload-artifact@v6
        with:
          name: MIUI-IME-Unlock-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ==================== 构建 Release (unsigned) ====================
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      # ==================== 对 Release APK 进行签名 ====================
      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0" 

      - name: Upload Signed Release APK (Artifact)
        uses: actions/upload-artifact@v6
        with:
          name: MIUI-IME-Unlock-Signed-Release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          if-no-files-found: error

      # ==================== 创建 GitHub Release 并上传签名 APK ====================
      - name: Create Release and Upload Signed APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          tag_name: ${{ github.ref_name }}
          name: MIUI IME Unlock ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## 下载
            - **Signed Release APK**（推荐安装）：已签名，可直接安装
            - Debug APK 请在下方 Artifacts 中下载
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
